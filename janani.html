<!DOCTYPE html>
<html>
<head>
    <title>Simple Webpage</title>

    <style>
        body {
            background-color: lightblue;
            font-family: Arial;
            text-align: center;
        }

        h1 {
            color: darkblue;
        }

        p {
            color: black;
            font-size: 18px;
        }

        a {
            color: red;
            text-decoration: none;
        }

        img {
            width: 250px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <h1>Welcome to My Webpage</h1>

    <p>This is a simple HTML webpage with CSS styling.</p>

    <img src="https://via.placeholder.com/250" alt="Sample Image">

    <br><br>

    <a href="https://www.google.com">Visit Google</a>

</body>
</html>
